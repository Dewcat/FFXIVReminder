name: Keep Actions Alive

on:
  schedule:
    # Create one harmless commit every month to prevent scheduled workflows from becoming inactive.
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update keepalive timestamp
        run: |
          mkdir -p .github
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive.txt

      - name: Commit keepalive update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.txt
          if git diff --cached --quiet; then
            echo "No keepalive changes to commit."
          else
            git commit -m "chore: keep actions alive"
            git push
          fi
